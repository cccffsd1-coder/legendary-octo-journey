<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupy - Messenger</title>
    <script src="/static/security.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #111; --bg: #f5f4f1; --text: #111; --text-muted: #888;
            --border: rgba(0, 0, 0, 0.06); --accent: #3a5bd9; --card-bg: #fff;
        }
        body.dark-mode {
            --bg: #0a0a0a; --text: #f5f4f1; --text-muted: #666;
            --border: rgba(255, 255, 255, 0.08); --card-bg: #141414;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { background: var(--card-bg); border-radius: 20px; padding: 30px; margin-bottom: 20px; }
        .header h1 { color: var(--text); margin-bottom: 10px; }
        .nav-links a { color: var(--accent); text-decoration: none; margin-right: 15px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .group-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; border: 1px solid var(--border); border-radius: 12px;
            margin-bottom: 15px; transition: 0.2s; cursor: pointer;
        }
        .group-item:hover { transform: translateX(5px); border-color: var(--accent); }
        .group-info { display: flex; align-items: center; gap: 15px; }
        .group-icon { width: 50px; height: 50px; border-radius: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; font-weight: bold; }
        .create-form { display: flex; flex-direction: column; gap: 15px; }
        .form-group { }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); }
        .btn { padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👥 Grupy</h1>
            <p style="color: var(--text-muted);">Czaty grupowe</p>
            <div class="nav-links" style="margin-top: 15px;">
                <a href="/chat">← Czat</a>
                <a href="/settings">Ustawienia</a>
                <a href="/friends">Znajomi</a>
            </div>
        </div>

        <div class="settings-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px;">
            <div class="card">
                <h2>Utwórz grupę</h2>
                <form class="create-form" onsubmit="createGroup(event)">
                    <div class="form-group">
                        <label>Nazwa grupy</label>
                        <input type="text" id="group-name" required>
                    </div>
                    <div class="form-group">
                        <label>Opis (opcjonalnie)</label>
                        <textarea id="group-description" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Utwórz</button>
                </form>
            </div>

            <div class="card">
                <h2>Twoje grupy</h2>
                {% for group in groups %}
                <div class="group-item" onclick="openGroup({{ group.id }})">
                    <div class="group-info">
                        <div class="group-icon">{{ group.name[:2].upper() }}</div>
                        <div>
                            <h3 style="font-size: 16px;">{{ group.name }}</h3>
                            <p style="font-size: 12px; color: var(--text-muted);">{{ group.description or 'Brak opisu' }}</p>
                        </div>
                    </div>
                    <span style="color: var(--accent);">→</span>
                </div>
                {% else %}
                <p style="color: var(--text-muted); text-align: center; padding: 40px;">Nie należysz do żadnej grupy</p>
                {% endfor %}
            </div>
        </div>
    </div>

    <script>
        async function createGroup(e) {
            e.preventDefault();
            const name = document.getElementById('group-name').value;
            const description = document.getElementById('group-description').value;

            const formData = new FormData();
            formData.append('name', name);
            formData.append('description', description);

            try {
                const response = await fetch('/api/groups/create', { method: 'POST', body: formData });
                const result = await response.json();
                if (result.ok) {
                    alert('Grupa utworzona!');
                    location.reload();
                }
            } catch (err) {
                alert('Błąd');
            }
        }

        function openGroup(groupId) {
            // TODO: Implement group chat view
            alert('Funkcjonalność czatu grupowego w trakcie implementacji. Group ID: ' + groupId);
        }
    </script>
</body>
</html>
